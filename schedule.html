<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动排班 - 带班首页</title>
    <link rel="stylesheet" href="recent-updates.css?v=20260724-2">
    <script src="recent-updates.js?v=20260724-2" defer></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-start: #eef4ff;
            --bg-end: #f8fbff;
            --primary: #246bfe;
            --primary-dark: #1749b6;
            --green: #12a150;
            --orange: #f79009;
            --red: #d92d20;
            --text: #162033;
            --muted: #667085;
            --card: rgba(255, 255, 255, 0.9);
            --border: rgba(36, 107, 254, 0.12);
            --shadow: 0 20px 60px rgba(21, 54, 120, 0.12);
        }

        html {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(36, 107, 254, 0.18), transparent 32%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            background-attachment: fixed;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .page {
            width: min(1440px, calc(100% - 28px));
            margin: 0 auto;
            padding: 28px 0 56px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 0 14px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--primary-dark);
            font-weight: 800;
            text-decoration: none;
        }

        .hero {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: end;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            margin-bottom: 18px;
            padding: 24px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .eyebrow {
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 0.86rem;
            font-weight: 900;
        }

        h1 {
            margin-bottom: 8px;
            font-size: clamp(2rem, 5vw, 3.6rem);
            line-height: 1.05;
            letter-spacing: 1px;
        }

        .hero-desc,
        .muted {
            color: var(--muted);
            line-height: 1.65;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 14px;
            background: #fff;
            color: var(--primary-dark);
            font-weight: 800;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(36, 107, 254, 0.12);
        }

        .btn.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .btn.ghost {
            background: rgba(255, 255, 255, 0.68);
        }

        .btn.active {
            border-color: var(--primary);
            background: rgba(36, 107, 254, 0.1);
            color: var(--primary-dark);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 18px;
            align-items: start;
            width: 100%;
            max-width: 100%;
            min-width: 0;
        }

        .panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            overflow: visible;
            border: 1px solid var(--border);
            border-radius: 22px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .panel:has(.person-card.active) {
            z-index: 30;
        }

        .panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            min-width: 0;
            padding: 18px 18px 0;
        }

        .panel-title {
            font-size: 1.08rem;
            letter-spacing: -0.03em;
        }

        .view-switch {
            display: inline-grid;
            grid-template-columns: 1fr 1fr;
            width: 176px;
            padding: 4px;
            border: 1px solid rgba(36, 107, 254, 0.12);
            border-radius: 999px;
            background: rgba(102, 112, 133, 0.1);
        }

        .view-switch-option {
            min-height: 32px;
            padding: 0 12px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 900;
        }

        .view-switch-option.active {
            background: #fff;
            color: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(21, 54, 120, 0.12);
        }

        .panel-body {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            overflow: visible;
            padding: 18px;
        }

        .calendar-wrap {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 8px;
        }

        .schedule-table {
            width: max-content;
            min-width: 100%;
            max-width: none;
            border-collapse: separate;
            border-spacing: 0;
        }

        .schedule-table th,
        .schedule-table td {
            border-right: 1px solid rgba(36, 107, 254, 0.1);
            border-bottom: 1px solid rgba(36, 107, 254, 0.1);
            padding: 10px;
            vertical-align: top;
            background: rgba(255, 255, 255, 0.68);
        }

        .schedule-table th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #f6f9ff;
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .schedule-table .row-head {
            position: sticky;
            left: 0;
            z-index: 3;
            min-width: 92px;
            background: #f6f9ff;
            color: var(--primary-dark);
            font-weight: 900;
        }

        .date-head {
            display: grid;
            gap: 2px;
        }

        .date-rule-list {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: 100%;
            min-width: 0;
            gap: 4px;
            margin-top: 6px;
        }

        .date-rule-pill {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            min-width: 0;
            max-width: 100%;
            gap: 4px;
            padding: 3px 6px;
            border: 0;
            border-radius: 999px;
            background: rgba(18, 161, 80, 0.14);
            color: #027a48;
            font-size: 0.7rem;
            font-weight: 900;
            line-height: 1.2;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        .date-rule-pill.blocked {
            background: rgba(217, 45, 32, 0.12);
            color: #b42318;
        }

        .date-rule-pill.rest {
            background: rgba(247, 144, 9, 0.14);
            color: #b54708;
        }

        .date-rule-pill .pill-delete {
            opacity: 0;
        }

        .date-rule-pill:hover .pill-delete {
            opacity: 1;
        }

        .weekday {
            color: var(--muted);
            font-size: 0.74rem;
            font-weight: 700;
        }

        .cell {
            min-width: 118px;
            min-height: 86px;
            cursor: pointer;
        }

        .cell-person-list {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        body.manual-menu-open {
            overflow: hidden;
        }

        .manual-backdrop {
            position: fixed;
            inset: 0;
            z-index: 9998;
            background: rgba(22, 32, 51, 0.18);
            cursor: default;
            touch-action: none;
        }

        .manual-menu {
            position: fixed;
            z-index: 10000;
            display: grid;
            gap: 8px;
            width: min(260px, calc(100vw - 28px));
            padding: 12px;
            border: 1px solid rgba(36, 107, 254, 0.14);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 52px rgba(21, 54, 120, 0.18);
        }

        .manual-menu-title {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 900;
        }

        .manual-option-list {
            display: grid;
            gap: 6px;
        }

        .manual-option {
            min-height: 34px;
            padding: 0 10px;
            border: 1px solid rgba(36, 107, 254, 0.12);
            border-radius: 12px;
            background: rgba(36, 107, 254, 0.06);
            color: var(--primary-dark);
            font-size: 0.84rem;
            font-weight: 900;
            text-align: left;
        }

        .manual-option:hover {
            border-color: var(--primary);
            background: rgba(36, 107, 254, 0.12);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            max-width: 100%;
            padding: 4px 7px;
            border-radius: 999px;
            background: rgba(36, 107, 254, 0.1);
            color: var(--primary-dark);
            font-size: 0.76rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .pill.locked {
            background: rgba(18, 161, 80, 0.14);
            color: #027a48;
        }

        .pill.blocked {
            background: rgba(217, 45, 32, 0.12);
            color: #b42318;
        }

        .pill.warning {
            background: rgba(247, 144, 9, 0.14);
            color: #b54708;
        }

        .assignment-action-menu {
            position: fixed;
            z-index: 10020;
            display: flex;
            gap: 6px;
            width: max-content;
            max-width: calc(100vw - 24px);
            padding: 6px;
            border: 1px solid rgba(36, 107, 254, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 14px 34px rgba(21, 54, 120, 0.2);
        }

        .assignment-action {
            min-height: 30px;
            padding: 0 10px;
            border: 0;
            border-radius: 999px;
            background: rgba(36, 107, 254, 0.08);
            color: var(--primary-dark);
            font-size: 0.76rem;
            font-weight: 900;
        }

        .assignment-action.delete {
            background: rgba(217, 45, 32, 0.1);
            color: #b42318;
        }

        .pill-delete {
            display: inline-grid;
            width: 14px;
            height: 14px;
            place-items: center;
            border-radius: 50%;
            background: var(--red);
            color: #fff;
            font-size: 0.68rem;
            line-height: 1;
            opacity: 0;
            transition: opacity 0.16s;
        }

        .pill.locked:hover .pill-delete,
        .pill.blocked:hover .pill-delete {
            opacity: 1;
        }

        .empty {
            color: #98a2b3;
            font-size: 0.82rem;
        }

        .fixed-empty-action {
            border: 0;
            background: transparent;
            color: #98a2b3;
            font-size: 0.82rem;
            text-align: left;
        }

        .people-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            width: 100%;
            max-width: 100%;
            min-width: 0;
            gap: 12px;
        }

        .person-card {
            position: relative;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            min-height: 0;
            padding: 14px;
            border: 1px solid rgba(36, 107, 254, 0.12);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.72);
            text-align: left;
            overflow: visible;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .person-card-header {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            align-items: start;
            width: 100%;
            min-width: 0;
            border: 0;
            background: transparent;
            color: inherit;
            text-align: left;
        }

        .person-info {
            display: block;
            min-width: 0;
        }

        .person-title-line {
            display: inline-flex;
            flex-wrap: wrap;
            align-items: baseline;
            width: fit-content;
            max-width: 100%;
            gap: 8px;
            min-width: 0;
        }

        .person-card.active {
            border-color: var(--primary);
            box-shadow: 0 14px 36px rgba(36, 107, 254, 0.14);
            transform: translateY(-1px);
            z-index: 12;
        }

        .avatar {
            display: inline-grid;
            width: 48px;
            height: 48px;
            place-items: center;
            justify-self: end;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(36, 107, 254, 0.16), rgba(18, 161, 80, 0.14));
            color: var(--primary-dark);
            font-weight: 900;
        }

        .person-name {
            font-size: 1.04rem;
            font-weight: 900;
        }

        .person-summary-inline {
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 500;
        }

        .person-summary {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 500;
            line-height: 1.55;
        }

        .person-conflicts {
            display: grid;
            gap: 4px;
            margin-top: 7px;
            color: #b42318;
            font-size: 0.74rem;
            line-height: 1.45;
        }

        .person-conflict {
            overflow-wrap: anywhere;
        }

        .person-preferences {
            display: block;
            position: absolute;
            top: calc(100% - 8px);
            left: 50%;
            right: auto;
            z-index: 20;
            width: min(560px, calc(100vw - 56px));
            max-width: calc(100vw - 56px);
            pointer-events: none;
            visibility: hidden;
            transition: visibility 0s linear 0.2s;
        }

        .person-preferences-inner {
            display: grid;
            gap: 12px;
            max-height: min(520px, calc(100vh - 120px));
            overflow: auto;
            padding: 14px 12px;
            border: 1px solid rgba(36, 107, 254, 0.12);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 18px 40px rgba(21, 54, 120, 0.16);
            opacity: 0;
            transform: translateY(-8px);
            transform-origin: top center;
            transition: opacity 0.18s ease, transform 0.2s ease, visibility 0s linear 0.2s;
            will-change: opacity, transform;
        }

        .schedule-preference-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        .schedule-preference-label {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .schedule-preference-tabs {
            display: inline-flex;
            padding: 3px;
            border-radius: 999px;
            background: rgba(36, 107, 254, 0.08);
        }

        .schedule-preference-tab {
            min-height: 28px;
            padding: 0 10px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 900;
        }

        .schedule-preference-tab.active {
            background: #fff;
            color: var(--primary-dark);
            box-shadow: 0 2px 8px rgba(21, 54, 120, 0.12);
        }

        .person-card.active .person-preferences {
            visibility: visible;
            pointer-events: auto;
            transition-delay: 0s;
        }

        .person-card.active .person-preferences-inner {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0s;
        }

        .person-card.prefs-placement-center .person-preferences {
            left: 50%;
            right: auto;
            transform: translateX(-50%);
        }

        .person-card.prefs-placement-center .person-preferences-inner {
            transform-origin: top center;
        }

        .person-card.prefs-placement-left .person-preferences {
            left: 0;
            right: auto;
            transform: none;
        }

        .person-card.prefs-placement-left .person-preferences-inner {
            transform-origin: top left;
        }

        .person-card.prefs-placement-right .person-preferences {
            left: auto;
            right: 0;
            transform: none;
        }

        .person-card.prefs-placement-right .person-preferences-inner {
            transform-origin: top right;
        }

        .fixed-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }

        .expand-toggle {
            display: inline-grid;
            width: 28px;
            height: 28px;
            place-items: center;
            position: relative;
            padding: 0;
            border: 1px solid rgba(36, 107, 254, 0.14);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.76);
            color: transparent;
            font-size: 0;
            font-weight: 900;
            line-height: 1;
            transition: transform 0.24s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .expand-toggle::before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 7px;
            height: 7px;
            border-right: 2px solid var(--primary-dark);
            border-bottom: 2px solid var(--primary-dark);
            transform: translate(-50%, -62%) rotate(45deg);
        }

        .expand-toggle.active {
            border-color: var(--primary);
            background: rgba(36, 107, 254, 0.1);
            transform: rotate(180deg);
        }

        .shift-tabs,
        .fixed-tags {
            display: flex;
            flex-wrap: wrap;
            max-width: 100%;
            min-width: 0;
            gap: 8px;
        }

        .fixed-tags {
            align-items: center;
        }

        .shift-tab {
            min-height: 34px;
            padding: 0 12px;
            border: 1px solid rgba(36, 107, 254, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.74);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 900;
        }

        .shift-tab.active {
            border-color: var(--primary);
            background: rgba(36, 107, 254, 0.12);
        }

        .shift-tab.rest.active {
            border-color: var(--orange);
            background: rgba(247, 144, 9, 0.14);
            color: #b54708;
        }

        .mode-tabs {
            display: inline-flex;
            width: fit-content;
            padding: 4px;
            border-radius: 999px;
            background: rgba(102, 112, 133, 0.1);
        }

        .mode-tab {
            min-height: 30px;
            padding: 0 12px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 900;
        }

        .mode-tab.active.work {
            background: rgba(18, 161, 80, 0.14);
            color: #027a48;
        }

        .mode-tab.active.block {
            background: rgba(217, 45, 32, 0.12);
            color: #b42318;
        }

        .mode-tab:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .mode-tab.active.block:disabled {
            opacity: 1;
        }

        .inline-date-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(76px, 1fr));
            gap: 8px;
            max-height: min(260px, calc(100vh - 300px));
            overflow: auto;
            padding: 8px;
            border: 1px solid rgba(36, 107, 254, 0.1);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.5);
        }

        .date-chip {
            min-height: 32px;
            border: 1px solid rgba(36, 107, 254, 0.12);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.76);
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 900;
        }

        .date-chip.active {
            border-color: var(--green);
            background: rgba(18, 161, 80, 0.14);
            color: #027a48;
        }

        .date-chip.rest-active {
            border-color: var(--orange);
            background: rgba(247, 144, 9, 0.14);
            color: #b54708;
        }

        .date-chip.block-active {
            border-color: var(--red);
            background: rgba(217, 45, 32, 0.12);
            color: #b42318;
        }

        .fixed-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
            min-height: 28px;
            padding: 0 8px;
            border-radius: 999px;
            background: rgba(36, 107, 254, 0.1);
            color: var(--primary-dark);
            font-size: 0.76rem;
            font-weight: 900;
            line-height: 1;
            cursor: grab;
        }

        .fixed-tag.rest {
            background: rgba(247, 144, 9, 0.14);
            color: #b54708;
        }

        .fixed-tag.blocked {
            background: rgba(217, 45, 32, 0.12);
            color: #b42318;
        }

        .delete-tag {
            display: grid;
            width: 16px;
            height: 16px;
            place-items: center;
            flex: 0 0 16px;
            border: 0;
            border-radius: 50%;
            background: var(--red);
            color: #fff;
            font-size: 0.7rem;
            line-height: 1;
            opacity: 0;
            transition: opacity 0.16s;
        }

        .fixed-tag:hover .delete-tag {
            opacity: 1;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .field {
            display: grid;
            gap: 7px;
        }

        .label {
            color: var(--text);
            font-size: 0.86rem;
            font-weight: 900;
        }

        .input,
        .select {
            width: 100%;
            min-height: 40px;
            padding: 0 12px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            color: var(--text);
            outline: none;
        }

        .rule-list {
            display: grid;
            gap: 8px;
            max-height: 180px;
            overflow: auto;
        }

        .rule-item {
            padding: 10px;
            border-radius: 14px;
            background: rgba(36, 107, 254, 0.06);
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.55;
        }

        .solution-list {
            display: grid;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            gap: 10px;
        }

        .solution-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-width: 0;
            padding: 12px;
            border: 1px solid rgba(36, 107, 254, 0.1);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.72);
        }

        .solution-card.active {
            border-color: var(--primary);
            background: rgba(36, 107, 254, 0.08);
        }

        .archive-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
        }

        .archive-input {
            display: none;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            z-index: 20;
            transform: translateX(-50%) translateY(18px);
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(22, 32, 51, 0.92);
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 1100px) {
            .hero,
            .layout {
                grid-template-columns: 1fr;
            }

            .toolbar {
                justify-content: flex-start;
            }
        }

        @media (max-width: 720px) {
            .page {
                width: min(100% - 20px, 1440px);
                padding-top: 18px;
            }

            .people-list {
                grid-template-columns: 1fr;
            }

            .panel-header {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="recent-updates-button" type="button" title="查看最近更新说明">最近更新</button>
    <main class="page">
        <div class="topbar">
            <a class="back-link" href="home.html">返回带班首页</a>
        </div>

        <section class="hero">
            <div>
                <div class="eyebrow">可用功能 · 自动排班</div>
                <h1>自动排班</h1>
                <p class="hero-desc" id="rangeText">正在生成排班周期...</p>
            </div>
            <div class="toolbar">
                <button class="btn primary" type="button" id="solveBtn">自动排班</button>
                <button class="btn ghost" type="button" id="clearBtn">清空排班</button>
            </div>
        </section>

        <div class="layout">
            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title" id="calendarTitle">日历排班</h2>
                        <p class="muted">点击已排班人员标签，可选择固定状态或删除该安排。</p>
                    </div>
                    <div class="view-switch" role="group" aria-label="日历视图">
                        <button class="view-switch-option active" type="button" id="shiftViewBtn">班次</button>
                        <button class="view-switch-option" type="button" id="personViewBtn">人员</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="calendar-wrap" id="calendarWrap"></div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">人员列表</h2>
                        <p class="muted">点击人员卡片展开选择；点击班次后选择日期，会实时固定到日历和人员卡片中。</p>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="people-list" id="peopleList"></div>
                    <div class="toolbar" style="justify-content: flex-start; margin-top: 12px;">
                        <button class="btn ghost" type="button" id="addPersonBtn">新增人员</button>
                        <button class="btn ghost" type="button" id="removePersonBtn">删除当前人员</button>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2 class="panel-title">候选排班</h2>
                        <p class="muted">自动求解后最多展示 10 个候选方案。</p>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="solution-list" id="solutionList"></div>
                </div>
            </section>
        </div>

        <div class="archive-actions">
            <button class="btn ghost" type="button" id="exportArchiveBtn">存档到本地</button>
            <button class="btn ghost" type="button" id="importArchiveBtn">从本地导入</button>
            <input class="archive-input" type="file" id="archiveFileInput" accept=".json,application/json">
        </div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const shifts = [
            { id: 'morning', name: '早' },
            { id: 'normal', name: '常' },
            { id: 'night', name: '晚' },
        ];
        const schedulePolicy = {
            weekdayMinimum: 7,
            weekendMinimum: 6,
            specialWeekdays: [1, 3],
            specialMinimum: 8,
            minimumNight: 3,
            hoursPerDay: 8,
            maximumExtraDays: 2,
            maximumConsecutiveDays: 6,
        };

        const state = {
            viewMode: 'shift',
            selectedPersonId: 'p1',
            openPersonId: '',
            preferenceShifts: {},
            preferenceModes: {},
            shiftPreferences: {},
            people: [
                { id: 'p1', name: '迪加' },
                { id: 'p2', name: '爱林' },
                { id: 'p3', name: '凡东' },
                { id: 'p4', name: '秦成' },
                { id: 'p5', name: '治政' },
                { id: 'p6', name: '思梦' },
                { id: 'p7', name: '少聪' },
                { id: 'p8', name: '李洵' },
                { id: 'p9', name: '何箫然' },
                { id: 'p10', name: '罗明月' },
                { id: 'p11', name: '倪雪莹' },
                { id: 'p12', name: '谢廖沙' },
                { id: 'p13', name: '张婉凝' },
            ],
            rules: {},
            assignments: {},
            locked: {},
            solutions: [],
            activeSolutionIndex: -1,
            diagnostics: {
                lastSolve: null,
            },
        };

        const calendarWrap = document.getElementById('calendarWrap');
        const peopleList = document.getElementById('peopleList');
        const solutionList = document.getElementById('solutionList');
        const rangeText = document.getElementById('rangeText');
        const calendarTitle = document.getElementById('calendarTitle');
        const toast = document.getElementById('toast');
        const archiveFileInput = document.getElementById('archiveFileInput');
        let toastTimer = null;
        let archiveExtensions = {};

        function getCycleDates() {
            const today = new Date();
            let startYear = today.getFullYear();
            let startMonth = today.getMonth();
            if (today.getDate() > 15) {
                startMonth += 1;
            }
            const start = new Date(startYear, startMonth, 16);
            const end = new Date(start.getFullYear(), start.getMonth() + 1, 15);
            const dates = [];
            for (const d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                dates.push({
                    key: formatDateKey(d),
                    label: `${d.getMonth() + 1}/${d.getDate()}`,
                    full: `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`,
                    dayIndex: d.getDay(),
                    weekday: ['日', '一', '二', '三', '四', '五', '六'][d.getDay()],
                });
            }
            return dates;
        }

        let dates = getCycleDates();
        function formatDateKey(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getRequiredAttendanceDays() {
            return dates.filter((date) => date.dayIndex >= 1 && date.dayIndex <= 5).length;
        }

        function getRequiredAttendanceHours() {
            return getRequiredAttendanceDays() * schedulePolicy.hoursPerDay;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function getRule(personId, dateKey) {
            state.rules[personId] ||= {};
            state.rules[personId][dateKey] ||= {
                allow: new Set(),
                block: new Set(),
                vacation: false,
            };
            return state.rules[personId][dateKey];
        }

        function getPersonWorkloadTargets(personId) {
            const paidLeaveDays = dates.filter((date) => state.rules[personId]?.[date.key]?.vacation).length;
            const minimumAttendanceDays = getRequiredAttendanceDays();
            const minimumWorkDays = Math.max(0, minimumAttendanceDays - paidLeaveDays);
            const maximumWorkDays = Math.min(
                dates.length - paidLeaveDays,
                minimumWorkDays + schedulePolicy.maximumExtraDays,
            );
            return {
                paidLeaveDays,
                minimumAttendanceDays,
                maximumAttendanceDays: minimumAttendanceDays + schedulePolicy.maximumExtraDays,
                minimumWorkDays,
                preferredWorkDays: minimumWorkDays,
                maximumWorkDays,
            };
        }

        function getAssignment(dateKey, shiftId) {
            state.assignments[dateKey] ||= {};
            state.assignments[dateKey][shiftId] ||= [];
            return state.assignments[dateKey][shiftId];
        }

        function personName(personId) {
            return state.people.find((person) => person.id === personId)?.name || '未知人员';
        }

        function assignmentKey(dateKey, shiftId, personId) {
            return `${dateKey}|${shiftId}|${personId}`;
        }

        function renderRange() {
            rangeText.textContent = `默认周期：${dates[0].full} 至 ${dates[dates.length - 1].full}。满勤 ${getRequiredAttendanceDays()} 天（${getRequiredAttendanceHours()} 小时），工作日至少 ${schedulePolicy.weekdayMinimum} 人，周末至少 ${schedulePolicy.weekendMinimum} 人，周一/周三至少 ${schedulePolicy.specialMinimum} 人；每人最多多排 ${schedulePolicy.maximumExtraDays} 天。`;
        }

        function getDateConfig(dateKey) {
            const date = dates.find((item) => item.key === dateKey);
            const dayIndex = date?.dayIndex;
            const isWeekend = dayIndex === 0 || dayIndex === 6;
            const isSpecial = schedulePolicy.specialWeekdays.includes(dayIndex);
            return {
                required: isSpecial
                    ? schedulePolicy.specialMinimum
                    : isWeekend
                        ? schedulePolicy.weekendMinimum
                        : schedulePolicy.weekdayMinimum,
                minimumNight: schedulePolicy.minimumNight,
            };
        }

        function renderPeople() {
            peopleList.innerHTML = state.people.map((person) => {
                const stats = getPersonStats(person.id);
                const active = person.id === state.openPersonId ? ' active' : '';
                const currentShift = getPreferenceShift(person.id);
                const currentMode = getPreferenceMode(person.id);
                const shiftPreference = getShiftPreference(person.id);
                const isRestMode = currentShift === 'rest';
                const conflicts = getPersonConflictMessages(person);
                return `
                    <article class="person-card${active}" data-person-id="${person.id}">
                        <button class="person-card-header" type="button" data-person-toggle="${person.id}">
                            <span class="person-info">
                                <span class="person-title-line">
                                    <span class="person-name">${person.name}</span>
                                    <span class="person-summary-inline">已排 ${stats.workDays} 天 / 早 ${stats.morning} 晚 ${stats.night} 常 ${stats.normal}</span>
                                </span>
                                <span class="person-summary">
                                    已固定 ${stats.rules} 天（休假 ${stats.vacations} 天）
                                </span>
                                ${conflicts.length ? `
                                    <span class="person-conflicts" role="status" aria-label="固定规则冲突">
                                        ${conflicts.slice(0, 3).map((message) => `<span class="person-conflict">冲突：${message}</span>`).join('')}
                                    </span>
                                ` : ''}
                            </span>
                            <span class="avatar">${person.name.slice(0, 1)}</span>
                        </button>
                        <div class="fixed-row">
                            <button class="expand-toggle${active ? ' active' : ''}" type="button" data-person-toggle="${person.id}" aria-label="${active ? '收起班次偏好' : '展开班次偏好'}" aria-expanded="${active ? 'true' : 'false'}">⌄</button>
                            <div class="fixed-tags">${renderFixedTags(person.id)}</div>
                        </div>
                        <div class="person-preferences">
                            <div class="person-preferences-inner">
                                <div class="schedule-preference-row">
                                    <span class="schedule-preference-label">偏好</span>
                                    <div class="schedule-preference-tabs" aria-label="自动排班班次偏好">
                                        <button class="schedule-preference-tab${shiftPreference === 'morning' ? ' active' : ''}" type="button" data-shift-preference="morning" data-person="${person.id}">早班</button>
                                        <button class="schedule-preference-tab${shiftPreference === 'night' ? ' active' : ''}" type="button" data-shift-preference="night" data-person="${person.id}">晚班</button>
                                        <button class="schedule-preference-tab${shiftPreference === 'balanced' ? ' active' : ''}" type="button" data-shift-preference="balanced" data-person="${person.id}">均衡</button>
                                    </div>
                                </div>
                                <div class="shift-tabs">
                                    <button class="shift-tab${currentShift === 'all' ? ' active' : ''}" type="button" data-pref-shift="all" data-person="${person.id}">
                                        全天
                                    </button>
                                    ${shifts.map((shift) => `
                                        <button class="shift-tab${currentShift === shift.id ? ' active' : ''}" type="button" data-pref-shift="${shift.id}" data-person="${person.id}">
                                            ${shift.name}班
                                        </button>
                                    `).join('')}
                                    <button class="shift-tab rest${currentShift === 'rest' ? ' active' : ''}" type="button" data-pref-shift="rest" data-person="${person.id}">
                                        休假
                                    </button>
                                </div>
                                <div class="mode-tabs" aria-label="固定类型">
                                    <button class="mode-tab work${!isRestMode && currentMode === 'work' ? ' active' : ''}" type="button" data-pref-mode="work" data-person="${person.id}"${isRestMode ? ' disabled' : ''}>固定上</button>
                                    <button class="mode-tab block${isRestMode || currentMode === 'block' ? ' active' : ''}" type="button" data-pref-mode="block" data-person="${person.id}"${isRestMode ? ' disabled' : ''}>固定不上</button>
                                </div>
                                <div class="inline-date-grid">
                                    ${dates.map((date) => renderPreferenceDate(person.id, date, currentShift, currentMode)).join('')}
                                </div>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');

            peopleList.querySelectorAll('[data-fixed-tag]').forEach((tag) => {
                tag.addEventListener('dragstart', (event) => {
                    event.dataTransfer.setData('text/plain', JSON.stringify({
                        personId: tag.dataset.person,
                        dateKey: tag.dataset.date,
                        shiftId: tag.dataset.shift,
                        mode: tag.dataset.mode,
                    }));
                });
            });

            syncPreferencePlacement();
        }

        function refreshPeopleOnly() {
            renderPeople();
        }

        function refreshPeopleAndCalendar() {
            renderPeople();
            renderCalendar();
        }

        function syncPreferencePlacement() {
            const popupWidth = Math.min(560, Math.max(260, window.innerWidth - 56));
            const viewportPadding = 16;
            peopleList.querySelectorAll('.person-card').forEach((card) => {
                const isActive = card.dataset.personId === state.openPersonId;
                let placement = 'prefs-placement-center';

                if (isActive) {
                    const rect = card.getBoundingClientRect();
                    const centeredLeft = rect.left + (rect.width / 2) - (popupWidth / 2);
                    const centeredRight = centeredLeft + popupWidth;
                    if (centeredLeft < viewportPadding) {
                        placement = 'prefs-placement-left';
                    } else if (centeredRight > window.innerWidth - viewportPadding) {
                        placement = 'prefs-placement-right';
                    }
                }

                card.classList.remove('prefs-placement-center', 'prefs-placement-left', 'prefs-placement-right');
                card.classList.add(placement);
            });
        }

        function getPreferenceShift(personId) {
            return state.preferenceShifts[personId] || 'morning';
        }

        function getPreferenceMode(personId) {
            return state.preferenceModes[personId] || 'work';
        }

        function getShiftPreference(personId) {
            return state.shiftPreferences[personId] || 'balanced';
        }

        function renderPreferenceDate(personId, date, currentShift, currentMode) {
            const rule = getRule(personId, date.key);
            const active = currentShift === 'rest'
                ? rule.vacation
                : currentMode === 'block'
                    ? rule.block.has(currentShift)
                    : rule.allow.has(currentShift);
            const activeClass = active ? (currentShift === 'rest' ? ' rest-active' : currentMode === 'block' ? ' block-active' : ' active') : '';
            return `
                <button class="date-chip${activeClass}" type="button" data-pref-date="${date.key}" data-person="${personId}">
                    ${date.label} 周${date.weekday}
                </button>
            `;
        }

        function renderFixedTags(personId) {
            const tags = [];
            dates.forEach((date) => {
                const rule = getRule(personId, date.key);
                if (rule.vacation) {
                    tags.push(renderFixedTag(personId, date.key, 'rest', 'rest', `${date.label} 休`));
                }
                rule.allow.forEach((shiftId) => {
                    const label = shiftId === 'all'
                        ? `${date.label} 全天 固定上`
                        : `${date.label} ${getShiftName(shiftId)}班 固定上`;
                    tags.push(renderFixedTag(personId, date.key, shiftId, 'work', label));
                });
                rule.block.forEach((shiftId) => {
                    const label = shiftId === 'all'
                        ? `${date.label} 全天 不上`
                        : `${date.label} ${getShiftName(shiftId)}班 不上`;
                    tags.push(renderFixedTag(personId, date.key, shiftId, 'block', label));
                });
            });
            return tags.length ? tags.join('') : `<button class="fixed-empty-action" type="button" data-person-toggle="${personId}">暂无固定班次，点击添加</button>`;
        }

        function renderFixedTag(personId, dateKey, shiftId, mode, label) {
            const restClass = shiftId === 'rest' ? ' rest' : '';
            const blockClass = mode === 'block' ? ' blocked' : '';
            return `
                <span class="fixed-tag${restClass}${blockClass}" draggable="true" data-fixed-tag data-person="${personId}" data-date="${dateKey}" data-shift="${shiftId}" data-mode="${mode}">
                    ${label}
                    <button class="delete-tag" type="button" data-delete-fixed data-person="${personId}" data-date="${dateKey}" data-shift="${shiftId}" data-mode="${mode}" aria-label="删除固定项">×</button>
                </span>
            `;
        }

        function parseDragData(event) {
            try {
                return JSON.parse(event.dataTransfer.getData('text/plain'));
            } catch (error) {
                return null;
            }
        }

        function togglePreferenceDate(personId, dateKey) {
            const shiftId = getPreferenceShift(personId);
            const mode = getPreferenceMode(personId);
            const rule = getRule(personId, dateKey);
            if (shiftId === 'rest') {
                if (rule.vacation) {
                    removePreference(personId, dateKey, 'rest', 'rest');
                } else {
                    setVacation(personId, dateKey);
                }
            } else if (mode === 'block') {
                if (rule.block.has(shiftId)) {
                    removePreference(personId, dateKey, shiftId, 'block');
                } else {
                    setBlockedShift(personId, dateKey, shiftId);
                }
            } else if (rule.allow.has(shiftId)) {
                removePreference(personId, dateKey, shiftId, 'work');
            } else {
                setFixedShift(personId, dateKey, shiftId);
            }
        }

        function movePreference(source, targetDateKey, targetShiftId) {
            if (source.personId !== state.selectedPersonId) {
                state.selectedPersonId = source.personId;
            }
            removePreference(source.personId, source.dateKey, source.shiftId, source.mode);
            if (source.mode === 'rest' || targetShiftId === 'rest') {
                setVacation(source.personId, targetDateKey);
            } else if (source.mode === 'block') {
                setBlockedShift(source.personId, targetDateKey, targetShiftId);
            } else {
                setFixedShift(source.personId, targetDateKey, targetShiftId);
            }
            showToast('已移动固定项');
        }

        function setVacation(personId, dateKey) {
            const rule = getRule(personId, dateKey);
            rule.vacation = true;
            rule.allow.clear();
            rule.block.clear();
            removePersonFromDate(personId, dateKey);
        }

        function setFixedShift(personId, dateKey, shiftId) {
            const rule = getRule(personId, dateKey);
            rule.vacation = false;
            if (shiftId === 'all') {
                rule.block.delete('all');
                rule.allow.clear();
                rule.allow.add('all');
                removePersonFromDate(personId, dateKey);
                return;
            }
            rule.block.delete(shiftId);
            rule.block.delete('all');
            rule.allow.clear();
            rule.allow.add(shiftId);
            removePersonFromDate(personId, dateKey);
            getAssignment(dateKey, shiftId).push(personId);
            state.locked[assignmentKey(dateKey, shiftId, personId)] = true;
        }

        function setBlockedShift(personId, dateKey, shiftId) {
            const rule = getRule(personId, dateKey);
            rule.vacation = false;
            if (shiftId === 'all') {
                rule.allow.clear();
                rule.block.clear();
                rule.block.add('all');
                removePersonFromDate(personId, dateKey);
                return;
            }
            rule.allow.delete(shiftId);
            rule.allow.delete('all');
            rule.block.add(shiftId);
            state.assignments[dateKey] ||= {};
            state.assignments[dateKey][shiftId] = (state.assignments[dateKey][shiftId] || []).filter((id) => id !== personId);
            delete state.locked[assignmentKey(dateKey, shiftId, personId)];
        }

        function removePreference(personId, dateKey, shiftId, mode = 'work') {
            const rule = getRule(personId, dateKey);
            if (shiftId === 'rest') {
                rule.vacation = false;
                return;
            }
            if (mode === 'block') {
                rule.block.delete(shiftId);
            } else {
                rule.allow.delete(shiftId);
                if (shiftId !== 'all') {
                    state.assignments[dateKey] ||= {};
                    state.assignments[dateKey][shiftId] = (state.assignments[dateKey][shiftId] || []).filter((id) => id !== personId);
                    delete state.locked[assignmentKey(dateKey, shiftId, personId)];
                }
            }
        }

        function closeAssignmentActionMenu() {
            document.querySelector('.assignment-action-menu')?.remove();
        }

        function deleteAssignment(personId, dateKey, shiftId) {
            state.assignments[dateKey] ||= {};
            state.assignments[dateKey][shiftId] = (state.assignments[dateKey][shiftId] || [])
                .filter((id) => id !== personId);
            delete state.locked[assignmentKey(dateKey, shiftId, personId)];
            getRule(personId, dateKey).allow.delete(shiftId);
        }

        function showAssignmentActionMenu(anchor) {
            closeAssignmentActionMenu();
            const personId = anchor.dataset.person;
            const dateKey = anchor.dataset.date;
            const shiftId = anchor.dataset.shift;
            const key = assignmentKey(dateKey, shiftId, personId);
            const isLocked = Boolean(state.locked[key]);
            const menu = document.createElement('div');
            menu.className = 'assignment-action-menu';
            menu.innerHTML = `
                <button class="assignment-action" type="button" data-assignment-lock-action>
                    ${isLocked ? '取消固定' : '固定'}
                </button>
                <button class="assignment-action delete" type="button" data-assignment-delete-action>删除</button>
            `;

            menu.querySelector('[data-assignment-lock-action]').addEventListener('click', (event) => {
                event.stopPropagation();
                if (isLocked) {
                    delete state.locked[key];
                    getRule(personId, dateKey).allow.delete(shiftId);
                    showToast('已取消固定，保留当前排班');
                } else {
                    setFixedShift(personId, dateKey, shiftId);

                refreshPeopleAndCalendar();
            });

            document.body.appendChild(menu);
            const anchorRect = anchor.getBoundingClientRect();
            const menuRect = menu.getBoundingClientRect();
            const left = Math.min(
                Math.max(12, anchorRect.left + (anchorRect.width - menuRect.width) / 2),
                window.innerWidth - menuRect.width - 12,
            );
            const preferredTop = anchorRect.bottom + 6;
            const top = preferredTop + menuRect.height <= window.innerHeight - 12
                ? preferredTop
                : Math.max(12, anchorRect.top - menuRect.height - 6);
            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;
        }

        function renderCalendar() {

        function renderDateHeader(date) {
            const rules = state.people.flatMap((person) => {
                const rule = getRule(person.id, date.key);
                const items = [];
                if (rule.allow.has('all')) {
                    items.push(renderDayRulePill(person.id, date.key, 'work', `${person.name} 全天可上`));
                }
                if (rule.block.has('all')) {
                    items.push(renderDayRulePill(person.id, date.key, 'block', `${person.name} 全天不上`));
                }
                if (rule.vacation) {
                    items.push(renderDayRulePill(person.id, date.key, 'rest', `${person.name} 休假`));
                }
                return items;
            }).join('');

            return `
                <span class="date-head">
                    <strong>${date.label}</strong>
                    <span class="weekday">周${date.weekday}</span>
                    ${rules ? `<span class="date-rule-list">${rules}</span>` : ''}
                </span>
            `;
        }

        function renderDayRulePill(personId, dateKey, mode, label) {
            const blockedClass = mode === 'block' ? ' blocked' : '';
            const restClass = mode === 'rest' ? ' rest' : '';
            return `<button class="date-rule-pill${blockedClass}${restClass}" type="button" data-day-rule data-person="${personId}" data-date="${dateKey}" data-mode="${mode}">${label}<span class="pill-delete">×</span></button>`;

        function renderCell(row, dateKey) {
            if (row.type === 'shift') {
                const assigned = getAssignment(dateKey, row.id);
                const blocked = getBlockedPeople(dateKey, row.id);
                if (!assigned.length && !blocked.length) {
                    return '<span class="empty">待排</span>';
                }
                return `<div class="cell-person-list">
                    ${assigned.map((personId) => renderPersonPill(dateKey, row.id, personId)).join('')}
                    ${blocked.map((personId) => renderBlockedPill(dateKey, row.id, personId, `${personName(personId)} 不上`)).join('')}
                </div>`;
            }

            const shiftsForPerson = shifts.filter((shift) => getAssignment(dateKey, shift.id).includes(row.id));
            const rule = getRule(row.id, dateKey);
            const blockedShifts = shifts.filter((shift) => rule.block.has(shift.id));
            if (rule.vacation) {
                return '<span class="pill warning">休假</span>';
            }
            if (!shiftsForPerson.length && !blockedShifts.length) {
                return '<span class="empty">休</span>';
            }
            return `<div class="cell-person-list">
                ${shiftsForPerson.map((shift) => renderPersonShiftPill(dateKey, shift.id, row.id)).join('')}
                ${blockedShifts.map((shift) => renderBlockedPill(dateKey, shift.id, row.id, `不上${shift.name}班`)).join('')}
            </div>`;
        }

        function renderPersonPill(dateKey, shiftId, personId) {
            const locked = state.locked[assignmentKey(dateKey, shiftId, personId)] ? ' locked' : '';
            return `<button class="pill${locked}" type="button" data-lock data-date="${dateKey}" data-shift="${shiftId}" data-person="${personId}">${personName(personId)}${locked ? ' 固定' : ''}</button>`;
        }

        function renderPersonShiftPill(dateKey, shiftId, personId) {
            const shift = shifts.find((item) => item.id === shiftId);
            const locked = state.locked[assignmentKey(dateKey, shiftId, personId)] ? ' locked' : '';
            return `<button class="pill${locked}" type="button" data-lock data-date="${dateKey}" data-shift="${shiftId}" data-person="${personId}">${shift.name}班${locked ? ' 固定' : ''}</button>`;
        }

        function renderBlockedPill(dateKey, shiftId, personId, label) {
            return `<button class="pill blocked" type="button" data-block data-date="${dateKey}" data-shift="${shiftId}" data-person="${personId}">${label}<span class="pill-delete">×</span></button>`;
        }

        function getBlockedPeople(dateKey, shiftId) {
            return state.people
                .filter((person) => getRule(person.id, dateKey).block.has(shiftId))
                .map((person) => person.id);
        }

        function closeManualMenu() {
            document.querySelector('.manual-menu')?.remove();
            document.querySelector('.manual-backdrop')?.remove();
            document.body.classList.remove('manual-menu-open');

                ? state.people.map((person) => ({ id: person.id, label: person.name }))
