<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带班首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #eef4ff;
            --bg-end: #f8fbff;
            --primary: #246bfe;
            --primary-dark: #1749b6;
            --text: #162033;
            --muted: #667085;
            --card: rgba(255, 255, 255, 0.88);
            --border: rgba(36, 107, 254, 0.12);
            --shadow: 0 20px 60px rgba(21, 54, 120, 0.12);
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(36, 107, 254, 0.18), transparent 32%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 42px 0 56px;
        }

        .module-card,
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 14px;
            background: #fff;
            color: var(--primary-dark);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(36, 107, 254, 0.14);
        }

        .btn.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .section {
            border-radius: 24px;
            padding: 26px;
        }

        .page-title {
            margin-bottom: 24px;
            text-align: center;
        }

        .page-title h1 {
            margin-bottom: 8px;
            font-size: clamp(2.2rem, 6vw, 4rem);
            line-height: 1.05;
            letter-spacing: 0;
        }

        .page-subtitle {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .section-title {
            font-size: 1.35rem;
            letter-spacing: -0.03em;
            text-align: center;
        }

        .section-desc {
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.6;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .module-card {
            min-height: 210px;
            border-radius: 20px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: inherit;
            font: inherit;
            text-align: left;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .module-card[href]:hover {
            transform: translateY(-4px);
            border-color: rgba(36, 107, 254, 0.32);
            box-shadow: 0 18px 44px rgba(21, 54, 120, 0.16);
        }

        .module-card.placeholder {
            cursor: not-allowed;
            opacity: 0.56;
            filter: grayscale(1);
            box-shadow: none;
            background: rgba(245, 247, 250, 0.8);
            border-color: rgba(102, 112, 133, 0.18);
        }

        .module-card.placeholder .module-kicker {
            color: #667085;
            background: rgba(102, 112, 133, 0.12);
        }

        .module-card.placeholder .module-footer {
            color: #98a2b3;
        }

        .module-kicker.available {
            color: #027a48;
            background: rgba(18, 161, 80, 0.14);
        }

        .module-kicker.developing {
            color: #667085;
            background: rgba(102, 112, 133, 0.12);
        }

        .module-kicker {
            display: inline-flex;
            width: fit-content;
            padding: 5px 9px;
            border-radius: 999px;
            color: var(--primary-dark);
            background: rgba(36, 107, 254, 0.1);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .module-title {
            margin: 18px 0 10px;
            font-size: 1.18rem;
            letter-spacing: -0.03em;
        }

        .module-desc {
            color: var(--muted);
            line-height: 1.65;
            font-size: 0.94rem;
        }

        .module-footer {
            margin-top: 20px;
            color: var(--primary);
            font-weight: 800;
        }

        .feedback-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 26px;
        }

        .feedback-toggle {
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.76);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .feedback-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(36, 107, 254, 0.12);
        }

        .feedback-panel {
            display: none;
            width: min(520px, 100%);
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .feedback-panel.show {
            display: block;
        }

        .feedback-input {
            width: 100%;
            min-height: 92px;
            padding: 12px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 14px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.82);
            font: inherit;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .feedback-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(36, 107, 254, 0.1);
        }

        .feedback-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .feedback-submit {
            min-height: 34px;
            padding: 0 14px;
            border: 1px solid var(--primary);
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(22, 32, 51, 0.92);
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 10;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 980px) {
            .module-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .page {
                width: min(100% - 24px, 1180px);
                padding-top: 24px;
            }

            .section {
                border-radius: 20px;
                padding: 22px;
            }

            .module-grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="page-title">
            <h1>带班首页</h1>
            <p class="page-subtitle" id="todaySubtitle">今天是</p>
        </header>

        <section class="section" id="modules">
            <div class="section-header">
                <div>
                    <h2 class="section-title">功能入口</h2>
                    <p class="section-desc">目前拆词加词助手可用，其他功能正在开发中。。。</p>
                </div>
            </div>

            <div class="module-grid">
                <a class="module-card" href="shareable.html">
                    <div>
                        <span class="module-kicker available">正式可用</span>
                        <h3 class="module-title">拆词加词助手</h3>
                        <p class="module-desc">原拆词加词助手功能，支持快捷拆词加词、生成和导入平台。</p>
                    </div>
                    <span class="module-footer">立即打开 →</span>
                </a>

                <a class="module-card" href="schedule.html">
                    <div>
                        <span class="module-kicker available">即将可用</span>
                        <h3 class="module-title">自动排班</h3>
                        <p class="module-desc">多人员/班次/偏好的排班方案生成器。</p>
                    </div>
                    <span class="module-footer">立即打开 →</span>
                </a>

                <a class="module-card" href="web-tracker.html">
                    <div>
                        <span class="module-kicker developing">即将可用</span>
                        <h3 class="module-title">网页追踪</h3>
                        <p class="module-desc">输入目标网页、监测区域和关键词，配置字节云函数后可创建后台监听任务。</p>
                    </div>
                    <span class="module-footer">打开配置 →</span>
                </a>

                <!-- <button class="module-card placeholder" type="button" data-feature="带班提示生成" disabled>
                    <div>
                        <span class="module-kicker developing">开发中</span>
                        <h3 class="module-title">带班提示生成</h3>
                        <p class="module-desc">基于飞书资料生成带班提示和注意事项的工具。</p>
                    </div>
                    <span class="module-footer">等待配置 →</span>
                </button>

                <button class="module-card placeholder" type="button" data-feature="指令记录" disabled>
                    <div>
                        <span class="module-kicker developing">开发中</span>
                        <h3 class="module-title">指令记录</h3>
                        <p class="module-desc">查询带班期间关键指令的工具。</p>
                    </div>
                    <span class="module-footer">等待配置 →</span>
                </button>

                <button class="module-card placeholder" type="button" data-feature="问答记录" disabled>
                    <div>
                        <span class="module-kicker developing">开发中</span>
                        <h3 class="module-title">问答记录</h3>
                        <p class="module-desc">记录一二确常见问题和历史问答资料的工具。</p>
                    </div>
                    <span class="module-footer">等待配置 →</span>
                </button> -->
            </div>
        </section>

        <footer class="feedback-footer">
            <button class="feedback-toggle" type="button" id="feedbackToggle">问题反馈</button>
            <form class="feedback-panel" id="feedbackPanel">
                <textarea class="feedback-input" id="feedbackInput" placeholder="请输入你遇到的问题或建议"></textarea>
                <div class="feedback-actions">
                    <button class="feedback-submit" type="submit">提交</button>
                </div>
            </form>
        </footer>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const toast = document.getElementById('toast');
        const placeholders = document.querySelectorAll('[data-feature]');
        const todaySubtitle = document.getElementById('todaySubtitle');
        const feedbackToggle = document.getElementById('feedbackToggle');
        const feedbackPanel = document.getElementById('feedbackPanel');
        const feedbackInput = document.getElementById('feedbackInput');
        let toastTimer = null;

        function renderToday() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            todaySubtitle.textContent = `今天是${year}年${month}月${day}日`;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        placeholders.forEach((item) => {
            item.addEventListener('click', () => {
                showToast(`${item.dataset.feature}入口已预留，待飞书数据源完善后接入。`);
            });
        });

        feedbackToggle.addEventListener('click', () => {
            feedbackPanel.classList.toggle('show');
            if (feedbackPanel.classList.contains('show')) {
                feedbackInput.focus();
            }
        });

        feedbackPanel.addEventListener('submit', (event) => {
            event.preventDefault();
            const content = feedbackInput.value.trim();
            if (!content) {
                showToast('请先填写反馈内容');
                return;
            }

            const subject = encodeURIComponent('带班首页问题反馈');
            const body = encodeURIComponent(`反馈内容：\n${content}\n\n页面：带班首页\n提交时间：${new Date().toLocaleString()}`);
            window.location.href = `mailto:lixun.hmd@jiyunhudong.com?subject=${subject}&body=${body}`;
            feedbackInput.value = '';
            feedbackPanel.classList.remove('show');
            showToast('已打开邮件客户端，请确认发送');
        });

        renderToday();
    </script>
</body>
</html>
