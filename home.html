<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带班首页</title>
    <link rel="stylesheet" href="recent-updates.css?v=20260724-2">
    <script src="recent-updates.js?v=20260724-2" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #eef4ff;
            --bg-end: #f8fbff;
            --primary: #246bfe;
            --primary-dark: #1749b6;
            --text: #162033;
            --muted: #667085;
            --card: rgba(255, 255, 255, 0.88);
            --border: rgba(36, 107, 254, 0.12);
            --shadow: 0 20px 60px rgba(21, 54, 120, 0.12);
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(36, 107, 254, 0.18), transparent 32%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 42px 0 56px;
        }

        .module-card,
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 14px;
            background: #fff;
            color: var(--primary-dark);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(36, 107, 254, 0.14);
        }

        .btn.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .section {
            border-radius: 24px;
            padding: 26px;
        }

        .page-title {
            margin-bottom: 24px;
            text-align: center;
        }

        .page-title h1 {
            margin-bottom: 8px;
            font-size: clamp(2.2rem, 6vw, 4rem);
            line-height: 1.05;
            letter-spacing: 0;
        }

        .page-subtitle {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .section-title {
            font-size: 1.35rem;
            letter-spacing: -0.03em;
            text-align: center;
        }

        .section-desc {
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.6;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .module-card {
            min-height: 210px;
            border-radius: 20px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: inherit;
            font: inherit;
            text-align: left;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .module-card[href]:hover {
            transform: translateY(-4px);
            border-color: rgba(36, 107, 254, 0.32);
            box-shadow: 0 18px 44px rgba(21, 54, 120, 0.16);
        }

        .module-card.placeholder {
            cursor: not-allowed;
            opacity: 0.56;
            filter: grayscale(1);
            box-shadow: none;
            background: rgba(245, 247, 250, 0.8);
            border-color: rgba(102, 112, 133, 0.18);
        }

        .module-card.placeholder .module-kicker {
            color: #667085;
            background: rgba(102, 112, 133, 0.12);
        }

        .module-card.placeholder .module-footer {
            color: #98a2b3;
        }

        .module-kicker.available {
            color: #027a48;
            background: rgba(18, 161, 80, 0.14);
        }

        .module-kicker.developing {
            color: #667085;
            background: rgba(102, 112, 133, 0.12);
        }

        .module-kicker {
            display: inline-flex;
            width: fit-content;
            padding: 5px 9px;
            border-radius: 999px;
            color: var(--primary-dark);
            background: rgba(36, 107, 254, 0.1);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .module-title {
            margin: 18px 0 10px;
            font-size: 1.18rem;
            letter-spacing: -0.03em;
        }

        .module-desc {
            color: var(--muted);
            line-height: 1.65;
            font-size: 0.94rem;
        }

        .module-footer {
            margin-top: 20px;
            color: var(--primary);
            font-weight: 800;
        }

        .module-card.multi-link-card:hover {
            transform: translateY(-4px);
            border-color: rgba(36, 107, 254, 0.32);
            box-shadow: 0 18px 44px rgba(21, 54, 120, 0.16);
        }

        .module-link-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 18px;
        }

        .module-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 14px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--primary-dark);
            font-size: 0.92rem;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
        }

        .module-link-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(36, 107, 254, 0.32);
            box-shadow: 0 12px 28px rgba(36, 107, 254, 0.14);
            background: #fff;
        }

        .quick-section {
            margin-bottom: 18px;
        }

        .quick-rescan-panel {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
        }

        .quick-rescan-input {
            width: 100%;
            min-height: 48px;
            padding: 0 15px;
            border: 1px solid rgba(36, 107, 254, 0.14);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            font: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .quick-rescan-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(36, 107, 254, 0.1);
            background: #fff;
        }

        .quick-rescan-actions {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .quick-rescan-manual {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
            padding: 0 12px;
            border: 1px solid rgba(36, 107, 254, 0.12);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.7);
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 800;
        }

        .quick-rescan-option {
            min-height: 44px;
            padding: 0 16px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 14px;
            background: #fff;
            color: var(--primary-dark);
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
        }

        .quick-rescan-option:hover {
            transform: translateY(-2px);
            border-color: rgba(36, 107, 254, 0.32);
            box-shadow: 0 14px 30px rgba(36, 107, 254, 0.12);
            background: #fff;
        }

        .quick-link-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 14px;
        }

        .feedback-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 26px;
        }

        .feedback-toggle {
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.76);
            color: var(--primary-dark);
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .feedback-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(36, 107, 254, 0.12);
        }

        .feedback-panel {
            display: none;
            width: min(520px, 100%);
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .feedback-panel.show {
            display: block;
        }

        .feedback-input {
            width: 100%;
            min-height: 92px;
            padding: 12px;
            border: 1px solid rgba(36, 107, 254, 0.16);
            border-radius: 14px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.82);
            font: inherit;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .feedback-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(36, 107, 254, 0.1);
        }

        .feedback-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        .feedback-submit {
            min-height: 34px;
            padding: 0 14px;
            border: 1px solid var(--primary);
            border-radius: 12px;
            background: var(--primary);
            color: #fff;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(22, 32, 51, 0.92);
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 10;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 980px) {
            .module-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .page {
                width: min(100% - 24px, 1180px);
                padding-top: 24px;
            }

            .section {
                border-radius: 20px;
                padding: 22px;
            }

            .module-grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .quick-rescan-panel {
                grid-template-columns: 1fr;
            }

            .quick-rescan-actions {
                width: 100%;
                justify-content: stretch;
            }

            .quick-rescan-option {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <main class="page">

                <a class="module-link-btn" href="https://bee.bytedance.net/1533/combine-imc/16745/data" target="_blank" rel="noopener noreferrer">拦截直播昵称</a>
                <a class="module-link-btn" href="https://bee.bytedance.net/1533/combine-imc/17557/data" target="_blank" rel="noopener noreferrer">主播黑名单</a>

                <a class="module-card" href="web-tracker.html">
                    <div>

                    </div>

                </a>

                    <div>

                        <h3 class="module-title">带班提示生成</h3>

            </div>
        </section>

        <footer class="feedback-footer">
            <button class="feedback-toggle" type="button" id="feedbackToggle">问题反馈</button>
            <form class="feedback-panel" id="feedbackPanel">
                <textarea class="feedback-input" id="feedbackInput" placeholder="请输入你遇到的问题或建议"></textarea>
                <div class="feedback-actions">

                </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const toast = document.getElementById('toast');
        const placeholders = document.querySelectorAll('[data-feature]');
        const todaySubtitle = document.getElementById('todaySubtitle');
        const feedbackToggle = document.getElementById('feedbackToggle');
        const feedbackPanel = document.getElementById('feedbackPanel');
        const feedbackInput = document.getElementById('feedbackInput');
        const quickRescanInput = document.getElementById('quickRescanInput');
        const quickRescanManual = document.getElementById('quickRescanManual');
        const quickScanGidBtn = document.getElementById('quickScanGidBtn');
        const quickScanMaterialBtn = document.getElementById('quickScanMaterialBtn');
        let toastTimer = null;

        function renderToday() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            todaySubtitle.textContent = `今天是${year}年${month}月${day}日`;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function getQuickRescanDateRange() {
            const now = new Date();
            return {
                startMs: new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1, 0, 0, 0, 0).getTime(),
                endMs: new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0).getTime() - 1
            };
        }

        function getQuickRescanValue() {
            return quickRescanInput.value.trim();
        }

        function getQuickRescanParts(value) {
            return value.split(/[，,;；\s]+/).map(item => item.trim()).filter(Boolean);
        }

        function isNumericRescanValue(value) {
            return /^[\d，,;；\s]+$/.test(value) && /\d/.test(value);
        }

        function openQuickRescan(type) {
            const keyword = getQuickRescanValue();
            if (!keyword) {
                showToast('请先输入需要回扫的 GID 或素材 ID');
                quickRescanInput.focus();
                return;
            }

            const { startMs, endMs } = getQuickRescanDateRange();
            const isGid = type === 'gid';
            const url = new URL(`https://imc.bytedance.net/tools/push-intercept/${isGid ? 'material-group' : 'material-intercept'}`);
            url.searchParams.set('curAppId', '1128');
            url.searchParams.set('isNewTask', '0');
            url.searchParams.set('startCreateTime', String(startMs));
            url.searchParams.set('endCreateTime', String(endMs));
            url.searchParams.set('pageNum', '1');
            if (isGid) {
                url.searchParams.set('isSimilar', '0');
            }
            if (isNumericRescanValue(keyword)) {
                url.searchParams.set('groupIds', getQuickRescanParts(keyword).join(','));
            } else {
                getQuickRescanParts(keyword).forEach(item => {
                    url.searchParams.append('materialValueList', item);
                });
            }
            if (quickRescanManual.checked) {
                url.searchParams.set('genTypeList', 'manual');
            }
            window.open(url.toString(), '_blank');
        }

        placeholders.forEach((item) => {
            item.addEventListener('click', () => {
                showToast(`${item.dataset.feature}入口已预留，待飞书数据源完善后接入。`);
            });
        });

        quickScanGidBtn.addEventListener('click', () => openQuickRescan('gid'));
        quickScanMaterialBtn.addEventListener('click', () => openQuickRescan('material'));
        quickRescanInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') openQuickRescan('gid');
        });

        feedbackToggle.addEventListener('click', () => {
            feedbackPanel.classList.toggle('show');
            if (feedbackPanel.classList.contains('show')) {
                feedbackInput.focus();
            }
        });

        feedbackPanel.addEventListener('submit', (event) => {
            event.preventDefault();
            const content = feedbackInput.value.trim();
            if (!content) {
                showToast('请先填写反馈内容');
                return;
            }

            const subject = encodeURIComponent('带班首页问题反馈');
            const body = encodeURIComponent(`反馈内容：\n${content}\n\n页面：带班首页\n提交时间：${new Date().toLocaleString()}`);
            window.location.href = `mailto:lixun.hmd@jiyunhudong.com?subject=${subject}&body=${body}`;
            feedbackInput.value = '';
            feedbackPanel.classList.remove('show');
            showToast('已打开邮件客户端，请确认发送');
        });

        renderToday();
    </script>
</body>
