<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC加词助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        .status.loading {
            background: #e3f2fd;
            color: #1565c0;
            display: block;
        }
        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
        }
        .word-item {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .word-item .w { color: #333; font-weight: 500; }
        .word-item .r { color: #666; margin-left: 8px; }
        .word-item .l { color: #999; margin-left: 8px; }
        .preview {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 IMC加词助手</h1>
        
        <div class="input-group">
            <label>词（Word）</label>
            <input type="text" id="wordInput" placeholder="请输入要添加的词，如：测试">
        </div>
        
        <div class="input-group">
            <label>原因（Reason）</label>
            <input type="text" id="reasonInput" placeholder="请输入原因，如：诱导" value="诱导">
        </div>
        
        <div class="input-group">
            <label>级别（Level）</label>
            <input type="text" id="levelInput" placeholder="请输入级别，如：P1" value="P1">
        </div>
        
        <button class="btn" id="addBtn">添加并提交</button>
        
        <div class="status" id="status"></div>
        
        <div class="hint">
            提示：请先登录IMC平台，再使用此工具。<br>
            请求会自动携带浏览器cookie进行认证。
        </div>
    </div>

    <script>
        const API_BASE = 'https://bee.bytedance.net/api/data';
        const DATASOURCE_ID = 17275;
        const DATA_ID = 1727500000015;

        const wordInput = document.getElementById('wordInput');
        const reasonInput = document.getElementById('reasonInput');
        const levelInput = document.getElementById('levelInput');
        const addBtn = document.getElementById('addBtn');
        const statusEl = document.getElementById('status');

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        async function getData() {
            showStatus('正在获取当前词库数据...', 'loading');
            try {
                const response = await fetch(`${API_BASE}/getData/${DATASOURCE_ID}/${DATA_ID}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json, text/plain, */*',
                        'businessid': '1533',
                        'Referer': `https://bee.bytedance.net/1533/combine-imc/${DATASOURCE_ID}/data`
                    },
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                return result.data;
            } catch (error) {
                console.error('获取数据失败:', error);
                throw error;
            }
        }

        async function submitData(data) {
            showStatus('正在提交数据...', 'loading');
            try {
                const response = await fetch(`${API_BASE}/edit/${DATASOURCE_ID}/${DATA_ID}`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json, text/plain, */*',
                        'Content-Type': 'application/json',
                        'businessid': '1533',
                        'Origin': 'https://bee.bytedance.net',
                        'Referer': `https://bee.bytedance.net/1533/combine-imc/${DATASOURCE_ID}/data`
                    },
                    body: JSON.stringify(data),
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                return result;
            } catch (error) {
                console.error('提交数据失败:', error);
                throw error;
            }
        }

        async function addWord() {
            const word = wordInput.value.trim();
            const reason = reasonInput.value.trim();
            const level = levelInput.value.trim();

            if (!word) {
                showStatus('请输入词！', 'error');
                return;
            }

            addBtn.disabled = true;

            try {
                const currentData = await getData();
                
                const newWord = {
                    word: word,
                    reason: reason || '',
                    level: level || ''
                };
                
                currentData.words.push(newWord);
                
                const submitResult = await submitData(currentData);
                
                if (submitResult.errCode === 0) {
                    showStatus(`✅ 添加成功！词："${word}"，原因："${reason}"，级别："${level}"`, 'success');
                    wordInput.value = '';
                } else {
                    showStatus(`❌ 添加失败：${submitResult.message || '未知错误'}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ 操作失败：${error.message}`, 'error');
            } finally {
                addBtn.disabled = false;
            }
        }

        addBtn.addEventListener('click', addWord);

        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addWord();
            }
        });
    </script>
</body>
</html>
