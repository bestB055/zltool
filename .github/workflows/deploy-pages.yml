name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'home.html'
      - 'index.html'
      - 'schedule.html'
      - 'web-tracker.html'
      - 'app-config.js'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          DOUBAO_SEARCH_API_URL: ${{ vars.DOUBAO_SEARCH_API_URL }}
        run: |
          mkdir -p site
          cp home.html index.html schedule.html web-tracker.html app-config.js site/
          printf 'window.DAIBAN_HOME_CONFIG = {\n    DOUBAO_SEARCH_API_URL: %s,\n};\n' "'$DOUBAO_SEARCH_API_URL'" > site/app-config.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4