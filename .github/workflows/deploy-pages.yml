name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'home.html'
      - 'index.html'
      - 'schedule.html'
      - 'web-tracker.html'
      - 'app-config.js'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          DOUBAO_SEARCH_API_URL: ${{ vars.DOUBAO_SEARCH_API_URL }}
          DEEPSEEK_API_KEY: ${{ vars.DEEPSEEK_API_KEY }}
          DOUBAO_SEARCH_API_KEY: ${{ vars.DOUBAO_SEARCH_API_KEY }}
        run: |
          mkdir -p site
          cp home.html index.html schedule.html web-tracker.html app-config.js site/
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config = {
              "DOUBAO_SEARCH_API_URL": os.environ.get("DOUBAO_SEARCH_API_URL", ""),
              "DEEPSEEK_API_KEY": os.environ.get("DEEPSEEK_API_KEY", ""),
              "DOUBAO_SEARCH_API_KEY": os.environ.get("DOUBAO_SEARCH_API_KEY", ""),
          }
          lines = ["window.DAIBAN_HOME_CONFIG = {"]
          for key, value in config.items():
              lines.append(f"    {key}: {json.dumps(value, ensure_ascii=False)},")
          lines.append("};")
          Path("site/app-config.js").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
